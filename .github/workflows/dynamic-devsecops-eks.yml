name: Dynamic DevSecOps Pipeline with EKS

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Customer application name"
        required: true
        default: "customer-app"

      customer_source:
        description: "Customer source type"
        required: true
        type: choice
        options:
          - current-repo
          - external-github-repo
        default: current-repo

      customer_repo_url:
        description: "Customer GitHub repo URL, only if source is external-github-repo"
        required: false
        type: string


      app_type:
        description: "Application type"
        required: true
        type: choice
        options:
          - auto-detect
          - nodejs
          - python
          - java
          - go
          - docker
        default: auto-detect

      scan_severity:
        description: "Severity level to block deployment"
        required: true
        type: choice
        options:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW
        default: HIGH

      customer_email:
        description: "Email to receive vulnerability report"
        required: true

      deploy_environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
          - skip-deployment
        default: dev

  push:
    branches:
      - main
      - develop

env:
  APP_NAME: ${{ github.event.inputs.app_name || 'customer-app' }}
  APP_TYPE: ${{ github.event.inputs.app_type || 'auto-detect' }}
  SCAN_SEVERITY: ${{ github.event.inputs.scan_severity || 'HIGH' }}
  CUSTOMER_EMAIL: ${{ github.event.inputs.customer_email || 'devteam@example.com' }}
  DEPLOY_ENV: ${{ github.event.inputs.deploy_environment || 'dev' }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  setup:
    name: Customer File Intake and Analysis
    runs-on: ubuntu-latest

    outputs:
      app_type: ${{ steps.detect.outputs.app_type }}
      language: ${{ steps.detect.outputs.language }}
      has_docker: ${{ steps.detect.outputs.has_docker }}
      has_terraform: ${{ steps.detect.outputs.has_terraform }}
      has_k8s: ${{ steps.detect.outputs.has_k8s }}

    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v4

      - name: Customer file intake
        run: |
          echo "=================================================="
          echo "CUSTOMER FILE INTAKE LAYER"
          echo "=================================================="
          echo "This layer collects the customer application/files."
          echo ""
          echo "Customer Source: ${{ github.event.inputs.customer_source }}"
          echo "Customer Repo URL: ${{ github.event.inputs.customer_repo_url }}"
          echo ""

          if [ "${{ github.event.inputs.customer_source }}" = "external-github-repo" ]; then
            if [ -z "${{ github.event.inputs.customer_repo_url }}" ]; then
              echo "ERROR: customer_repo_url is required for external-github-repo"
              exit 1
            fi

            echo "Cloning customer repository..."
            rm -rf customer-upload
            git clone "${{ github.event.inputs.customer_repo_url }}" customer-upload

            echo "Copying customer files into scanning workspace..."
            rsync -av customer-upload/ ./ \
              --exclude ".git" \
              --exclude ".github"

            rm -rf customer-upload
          else
            echo "Using files already present in current repository."
          fi

          echo ""
          echo "Customer files received successfully."
          echo "Listing top-level files:"
          ls -la

      - name: Analyze uploaded customer files
        id: file_analysis
        run: |
          echo "=================================================="
          echo "CUSTOMER FILE STRUCTURE ANALYSIS"
          echo "=================================================="
          echo "The pipeline is now analyzing the uploaded files."
          echo ""

          echo "Detected important files:"
          [ -f package.json ] && echo "Node.js file found: package.json"
          [ -f requirements.txt ] && echo "Python file found: requirements.txt"
          [ -f pom.xml ] && echo "Java Maven file found: pom.xml"
          [ -f build.gradle ] && echo "Java Gradle file found: build.gradle"
          [ -f go.mod ] && echo "Go module file found: go.mod"
          [ -f Dockerfile ] && echo "Docker file found: Dockerfile"
          [ -d k8s ] && echo "Kubernetes folder found: k8s/"
          find . -name "*.tf" | grep -q . && echo "Terraform files found"

          echo ""
          echo "This file analysis decides which security layers are applicable."

      - name: Auto-detect uploaded file/application type
        id: detect
        run: |
          chmod +x scripts/detect_app_type.sh
          bash scripts/detect_app_type.sh "${{ env.APP_TYPE }}"

      - name: Show customer scan plan
        run: |
          echo "=================================================="
          echo "SECURITY SCAN PLAN FOR CUSTOMER FILES"
          echo "=================================================="
          echo "Customer App Name : ${{ env.APP_NAME }}"
          echo "Detected Type     : ${{ steps.detect.outputs.app_type }}"
          echo "Detected Language : ${{ steps.detect.outputs.language }}"
          echo "Docker Available  : ${{ steps.detect.outputs.has_docker }}"
          echo "Terraform Found   : ${{ steps.detect.outputs.has_terraform }}"
          echo "Kubernetes Found  : ${{ steps.detect.outputs.has_k8s }}"
          echo ""
          echo "The following layered scans will be executed:"
          echo "Layer 1: GitLeaks Secret Scanning"
          echo "Layer 2: SAST Code Scanning"
          echo "Layer 3: Dependency Vulnerability Scanning"
          echo "Layer 4: Container Image Scanning"
          echo "Layer 5: Infrastructure-as-Code Scanning"
          echo "Layer 6: OPA Policy Gate"
          echo "=================================================="
         
  security_scans:
    name: Layer-wise Security Scanning
    runs-on: ubuntu-latest
    needs: setup

    outputs:
      critical_count: ${{ steps.compile.outputs.critical_count }}
      high_count: ${{ steps.compile.outputs.high_count }}
      medium_count: ${{ steps.compile.outputs.medium_count }}
      low_count: ${{ steps.compile.outputs.low_count }}
      secrets_count: ${{ steps.compile.outputs.secrets_count }}
      policy_failed: ${{ steps.opa.outputs.policy_failed }}
      container_build_ok: ${{ steps.container_scan.outputs.container_build_ok }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports
      - name: Customer app intake for security scanning
        run: |
          echo "=================================================="
          echo "CUSTOMER APP INTAKE FOR SECURITY SCANNING"
          echo "=================================================="

          rm -rf app
          mkdir -p app

          if [ "${{ github.event.inputs.customer_source }}" = "external-github-repo" ]; then
            echo "Cloning customer repository into app/"
            git clone "${{ github.event.inputs.customer_repo_url }}" app
            rm -rf app/.git
          else
            echo "Using current repository as customer app"
            rsync -av ./ app/ \
              --exclude ".git" \
              --exclude ".github" \
              --exclude "scripts" \
              --exclude "reports" \
              --exclude "policy" \
              --exclude "k8s" \
              --exclude "app"
          fi

          echo "Dockerfile found for scanning:"
          find app -name "Dockerfile" -type f

      - name: "Layer 1: GitLeaks Secret Scanning"
        continue-on-error: true
        run: |
          echo "=================================================="
          echo "LAYER 1: GITLEAKS SECRET SCANNING"
          echo "=================================================="
          echo "Purpose:"
          echo "This scan checks whether the uploaded customer files contain"
          echo "hardcoded secrets such as API keys, passwords, tokens, or credentials."
          echo ""
          echo "Files being scanned:"
          find . -type f | head -30
          echo ""

          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz | tar xz -C /tmp

          /tmp/gitleaks detect \
            --source . \
            --report-format json \
            --report-path reports/gitleaks-report.json \
            --exit-code 0 || true

          echo ""
          echo "GitLeaks scan completed."
          echo "Report generated: reports/gitleaks-report.json"

          if [ -f reports/gitleaks-report.json ]; then
            COUNT=$(python3 -c "import json; data=json.load(open('reports/gitleaks-report.json')); print(len(data) if isinstance(data,list) else 0)" || echo 0)
            echo "Secrets found: $COUNT"
          else
            echo "No GitLeaks report generated."
          fi

      - name: "Layer 2: SAST Code Scanning"
        continue-on-error: true
        run: |
          echo "=================================================="
          echo "LAYER 2: SAST CODE SCANNING"
          echo "=================================================="
          echo "Purpose:"
          echo "This scan analyzes the source code for bugs, vulnerabilities,"
          echo "code smells, insecure coding patterns, and maintainability issues."
          echo ""
          echo "Tool used: SonarCloud"
          echo ""

          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "SONAR_TOKEN is not configured."
            echo "Skipping SonarCloud scan."
            echo '{"status":"skipped","message":"SONAR_TOKEN not configured"}' > reports/sonar-report.json
            exit 0
          fi

          npm install -g sonarqube-scanner

          sonar-scanner \
            -Dsonar.projectKey="${{ env.APP_NAME }}" \
            -Dsonar.organization="${{ secrets.SONAR_ORG }}" \
            -Dsonar.sources=. \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${{ secrets.SONAR_TOKEN }}" || true

          echo '{"status":"completed","tool":"SonarCloud","layer":"SAST"}' > reports/sonar-report.json

          echo ""
          echo "SAST scan completed."
          echo "Report generated: reports/sonar-report.json"

      - name: "Layer 3: Dependency Vulnerability Scanning"
        continue-on-error: true
        run: |
          echo "=================================================="
          echo "LAYER 3: DEPENDENCY VULNERABILITY SCANNING"
          echo "=================================================="
          echo "Purpose:"
          echo "This scan checks third-party libraries and packages used"
          echo "by the uploaded customer application."
          echo ""
          echo "Detected application type: ${{ needs.setup.outputs.app_type }}"
          echo ""

          APP="${{ needs.setup.outputs.app_type }}"

          if [ "$APP" = "nodejs" ] && [ -f "package.json" ]; then
            echo "Node.js detected."
            echo "Running npm audit..."
            npm install || true
            npm audit --json > reports/npm-audit.json 2>&1 || true
            echo "npm audit report generated: reports/npm-audit.json"
          fi

          if [ "$APP" = "python" ] && [ -f "requirements.txt" ]; then
            echo "Python detected."
            echo "Running Safety scan..."
            pip install safety -q
            safety check -r requirements.txt --json > reports/safety-report.json 2>&1 || true
            echo "Safety report generated: reports/safety-report.json"
          fi

          if [ "$APP" = "java" ] && [ -f "pom.xml" ]; then
            echo "Java Maven project detected."
            echo "Running OWASP Dependency Check..."
            mvn dependency:resolve org.owasp:dependency-check-maven:check \
              -Dformat=JSON \
              -DoutputDirectory=reports || true
            echo "Java dependency report generated in reports/"
          fi

          if [ "$APP" = "go" ] && [ -f "go.mod" ]; then
            echo "Go project detected."
            echo "Running gosec..."
            go install github.com/securego/gosec/v2/cmd/gosec@latest || true
            ~/go/bin/gosec -fmt json -out reports/gosec-report.json ./... || true
            echo "GoSec report generated: reports/gosec-report.json"
          fi

          echo ""
          echo "Dependency scanning layer completed."

      - name: "Layer 3B: Snyk Open Source Dependency Scan"
        continue-on-error: true
        run: |
          echo "=================================================="
          echo "LAYER 3B: SNYK OPEN SOURCE DEPENDENCY SCAN"
          echo "=================================================="
          echo "Purpose:"
          echo "This scan checks open-source package vulnerabilities"
          echo "using the Snyk vulnerability database."
          echo ""

          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "SNYK_TOKEN is not configured."
            echo "Skipping Snyk scan."
            echo '{"status":"skipped","message":"SNYK_TOKEN not configured"}' > reports/snyk-report.json
            exit 0
          fi

          npm install -g snyk
          snyk auth "${{ secrets.SNYK_TOKEN }}"
          snyk test --json > reports/snyk-report.json 2>&1 || true

          echo "Snyk scan completed."
          echo "Report generated: reports/snyk-report.json"

      - name: "Layer 4: Container Image Scanning"
        id: container_scan
        continue-on-error: true
        run: |
          echo "=================================================="
          echo "LAYER 4: CONTAINER IMAGE SCANNING"
          echo "=================================================="
          echo "Purpose:"
          echo "This scan validates and scans the same Docker image build path that will later be used for deployment."
          echo ""

          mkdir -p reports

          # Default: block deployment unless full container build + scan completes
          echo "container_build_ok=false" >> "$GITHUB_OUTPUT"

          if [ ! -d app ]; then
            echo "ERROR: app/ folder not found. Customer app intake step may be missing."

            python3 -c 'import json, os; os.makedirs("reports", exist_ok=True); open("reports/trivy-report.json", "w").write(json.dumps({"Results": [], "status": "app_folder_missing", "message": "app/ folder not found. Deployment is blocked."}, indent=2))'

            exit 0
          fi

          if ! find app -name "Dockerfile" -type f | grep -q .; then
            echo "ERROR: No Dockerfile found inside customer app folder."

            python3 -c 'import json, os; os.makedirs("reports", exist_ok=True); open("reports/trivy-report.json", "w").write(json.dumps({"Results": [], "status": "dockerfile_missing", "message": "No Dockerfile found inside app/. Deployment is blocked."}, indent=2))'

            exit 0
          fi

          chmod +x scripts/dockerfile_first_build.sh

          echo "Building customer Docker image in scan-only mode..."

          if ! bash scripts/dockerfile_first_build.sh \
            "${{ env.APP_NAME }}" \
            "${{ env.IMAGE_TAG }}" \
            "local" \
            "scan-only"; then

            echo "ERROR: Docker build failed during container scanning."

            python3 -c 'import json, os; os.makedirs("reports", exist_ok=True); open("reports/trivy-report.json", "w").write(json.dumps({"Results": [], "status": "docker_build_failed", "message": "Customer Dockerfile build failed during security scanning. Deployment is blocked."}, indent=2))'

            exit 0
          fi

          # IMAGE is written to GITHUB_ENV by dockerfile_first_build.sh.
          # In the same step, we must read it manually.
          IMAGE_TO_SCAN=$(grep '^IMAGE=' "$GITHUB_ENV" | tail -1 | cut -d'=' -f2-)

          if [ -z "$IMAGE_TO_SCAN" ]; then
            echo "ERROR: Docker image name was not generated."

            python3 -c 'import json, os; os.makedirs("reports", exist_ok=True); open("reports/trivy-report.json", "w").write(json.dumps({"Results": [], "status": "image_name_missing", "message": "Docker image name was not generated after build. Deployment is blocked."}, indent=2))'

            exit 0
          fi

          echo "Docker build completed successfully."
          echo "Image to scan: $IMAGE_TO_SCAN"

          echo "Installing Trivy..."
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

          echo "Running Trivy container image scan..."

          trivy image \
            --format json \
            --output reports/trivy-report.json \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            "$IMAGE_TO_SCAN" || true

          if [ ! -f reports/trivy-report.json ]; then
            echo "ERROR: Trivy report was not generated."

            python3 -c 'import json, os; os.makedirs("reports", exist_ok=True); open("reports/trivy-report.json", "w").write(json.dumps({"Results": [], "status": "trivy_scan_failed", "message": "Trivy scan failed or report was not generated. Deployment is blocked."}, indent=2))'

            exit 0
          fi

          echo "container_build_ok=true" >> "$GITHUB_OUTPUT"

          echo "Container image build and scanning completed successfully."
          echo "Report generated: reports/trivy-report.json"

      - name: "Layer 5: Infrastructure as Code Scanning"
        continue-on-error: true
        run: |
          echo "=================================================="
          echo "LAYER 5: INFRASTRUCTURE AS CODE SCANNING"
          echo "=================================================="
          echo "Purpose:"
          echo "This scan checks Terraform, Kubernetes, and Dockerfile"
          echo "configuration files for cloud security misconfigurations."
          echo ""
          echo "Tool used: Checkov"
          echo ""

          pip install checkov -q

          checkov -d . \
            --framework terraform,kubernetes,dockerfile \
            --output json \
            > reports/checkov-report.json 2>&1 || true

          echo "IaC scanning completed."
          echo "Report generated: reports/checkov-report.json"

      - name: Compile scan results
        id: compile
        run: |
          python3 scripts/compile_scan_results.py \
            --reports-dir reports \
            --output reports/scan-summary.json

          echo "critical_count=$(jq -r '.critical_count' reports/scan-summary.json)" >> $GITHUB_OUTPUT
          echo "high_count=$(jq -r '.high_count' reports/scan-summary.json)" >> $GITHUB_OUTPUT
          echo "medium_count=$(jq -r '.medium_count' reports/scan-summary.json)" >> $GITHUB_OUTPUT
          echo "low_count=$(jq -r '.low_count' reports/scan-summary.json)" >> $GITHUB_OUTPUT
          echo "secrets_count=$(jq -r '.secrets_count' reports/scan-summary.json)" >> $GITHUB_OUTPUT

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: OPA policy evaluation
        id: opa
        continue-on-error: true
        run: |
          echo "=================================================="
          echo "LAYER 6: OPA POLICY GATE"
          echo "=================================================="
          echo "Purpose:"
          echo "This layer evaluates the final scan results against"
          echo "security policy rules before allowing deployment."
          echo ""
          echo "Policy rule:"
          echo "Deployment is blocked if Critical, High, or Secrets are found."
          echo ""

          opa eval \
            --format json \
            --data policy/deployment_policy.rego \
            --input reports/scan-summary.json \
            "data.devsecops.policy.deny" \
            > reports/opa-result.json

          DENY_COUNT=$(jq '.result[0].expressions[0].value | length' reports/opa-result.json)

          if [ "$DENY_COUNT" -gt 0 ]; then
            echo "policy_failed=true" >> $GITHUB_OUTPUT
            echo "OPA POLICY FAILED"
            cat reports/opa-result.json
          else
            echo "policy_failed=false" >> $GITHUB_OUTPUT
            echo "OPA POLICY PASSED"
          fi

      - name: Customer Security Scan Summary
        if: always()
        run: |
          echo "=================================================="
          echo "CUSTOMER SECURITY SCAN SUMMARY"
          echo "=================================================="
          echo "Application/File Name : ${{ env.APP_NAME }}"
          echo "Customer Source       : ${{ github.event.inputs.customer_source || 'current-repo' }}"
          echo "Detected Type         : ${{ needs.setup.outputs.app_type }}"
          echo ""
          echo "Completed Security Layers:"
          echo "Layer 1  - GitLeaks Secret Scanning"
          echo "Layer 2  - SAST Code Scanning"
          echo "Layer 3  - Dependency Vulnerability Scanning"
          echo "Layer 3B - Snyk Open Source Scan"
          echo "Layer 4  - Container Image Scanning"
          echo "Layer 5  - IaC Misconfiguration Scanning"
          echo "Layer 6  - OPA Policy Gate"
          echo ""
          echo "Scan Counts:"
          echo "Critical : ${{ steps.compile.outputs.critical_count }}"
          echo "High     : ${{ steps.compile.outputs.high_count }}"
          echo "Medium   : ${{ steps.compile.outputs.medium_count }}"
          echo "Low      : ${{ steps.compile.outputs.low_count }}"
          echo "Secrets  : ${{ steps.compile.outputs.secrets_count }}"
          echo ""
          echo "Reports generated in reports/ folder."
          echo "Excel report will be generated in the next job."
          echo "=================================================="


      - name: Generate individual Excel reports
        if: always()
        run: |
          pip install openpyxl -q

          python3 scripts/generate_individual_excel_reports.py \
            --reports-dir reports \
            --output-dir reports \
            --app-name "${{ env.APP_NAME }}"

      - name: Upload raw JSON reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-json-security-reports-${{ github.run_id }}
          path: reports/*.json
          retention-days: 30

      - name: Upload individual Excel reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: individual-excel-security-reports-${{ github.run_id }}
          path: reports/*.xlsx
          retention-days: 60

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama Service
        run: |
          ollama serve > /dev/null 2>&1 &
          sleep 10

      - name: Pull TinyLlama Model
        run: |
          ollama pull tinyllama

      - name: Verify Ollama
        run: |
          ollama list

      - name: Install AI Dependencies
        run: |
          pip install pandas openpyxl requests

      - name: Run AI Fix Recommendation Engine
        run: |
          python3 scripts/AI_fix_recommendation.py
  send_email_alert:
    name: Send Email Alert If Policy Failed
    runs-on: ubuntu-latest
    needs: security_scans
    if: needs.security_scans.outputs.policy_failed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download raw JSON reports
        uses: actions/download-artifact@v4
        with:
          name: raw-json-security-reports-${{ github.run_id }}
          path: reports/

      - name: Download Excel reports
        uses: actions/download-artifact@v4
        with:
          name: individual-excel-security-reports-${{ github.run_id }}
          path: reports/

      - name: Install SendGrid
        run: pip install sendgrid -q

      - name: Send vulnerability email
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          PIPELINE_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/send_alert_email.py \
            --to "${{ env.CUSTOMER_EMAIL }}" \
            --from-email "${{ secrets.ALERT_FROM_EMAIL }}" \
            --app-name "${{ env.APP_NAME }}" \
            --critical "${{ needs.security_scans.outputs.critical_count }}" \
            --high "${{ needs.security_scans.outputs.high_count }}" \
            --medium "${{ needs.security_scans.outputs.medium_count }}" \
            --pipeline-url "$PIPELINE_URL" \
            --reports-dir reports

  manual_approval:
    name: Manual Approval Before Deployment
    runs-on: ubuntu-latest
    needs: [security_scans, send_email_alert]
    if: needs.security_scans.outputs.policy_failed == 'true'

    environment:
      name: vulnerability-review

    steps:
      - name: Manual approval completed
        run: |
          echo "Reviewer approved deployment."
          echo "Proceeding to EKS deployment."

  deploy_to_eks:
    name: Deploy to Amazon EKS
    runs-on: ubuntu-latest
    needs: [security_scans, manual_approval]

    if: |
      always() &&
      needs.security_scans.result == 'success' &&
      needs.security_scans.outputs.container_build_ok == 'true' &&
      github.event.inputs.deploy_environment != 'skip-deployment' &&
      (
        needs.security_scans.outputs.policy_failed == 'false' ||
        needs.manual_approval.result == 'success'
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Customer app intake
        run: |
          echo "=================================================="
          echo "CUSTOMER APP INTAKE FOR DEPLOYMENT"
          echo "=================================================="

          rm -rf app
          mkdir -p app

          if [ "${{ github.event.inputs.customer_source }}" = "external-github-repo" ]; then
            echo "Cloning customer repository into app/"
            git clone "${{ github.event.inputs.customer_repo_url }}" app
            rm -rf app/.git
          else
            echo "Using current repository as customer app"
            rsync -av ./ app/ \
              --exclude ".git" \
              --exclude ".github" \
              --exclude "scripts" \
              --exclude "reports" \
              --exclude "policy" \
              --exclude "k8s" \
              --exclude "app"
          fi

          echo "Dockerfile found:"
          find app -name "Dockerfile" -type f

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image using customer Dockerfile
        run: |
          echo "=================================================="
          echo "BUILDING CUSTOMER DOCKER IMAGE"
          echo "=================================================="

          chmod +x scripts/dockerfile_first_build.sh

          bash scripts/dockerfile_first_build.sh \
            "${{ env.APP_NAME }}" \
            "${{ env.IMAGE_TAG }}" \
            "${{ secrets.DOCKER_USERNAME }}" \
            "push"
      - name: Verify Docker image variables
        run: |
          echo "=================================================="
          echo "VERIFYING DOCKER IMAGE VARIABLES"
          echo "=================================================="

          echo "Image from previous step: $IMAGE"
          echo "App port from previous step: $APP_PORT"

          if [ -z "$IMAGE" ]; then
            echo "ERROR: IMAGE is empty. dockerfile_first_build.sh did not export IMAGE to GITHUB_ENV."
            exit 1
          fi

          if [ -z "$APP_PORT" ]; then
            echo "APP_PORT is empty. Defaulting to 80."
            echo "APP_PORT=80" >> "$GITHUB_ENV"
          fi

      - name: Connect kubectl to EKS
        run: |
          echo "=================================================="
          echo "CONNECTING TO EKS"
          echo "=================================================="

          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

          kubectl get nodes

      - name: Deploy to dev
        run: |
          echo "=================================================="
          echo "DEPLOYING TO DEV"
          echo "=================================================="

          ENV_NAME="dev"
          SERVICE_TYPE="ClusterIP"

          echo "Image: $IMAGE"
          echo "Port : $APP_PORT"

          kubectl create namespace "$ENV_NAME" --dry-run=client -o yaml | kubectl apply -f -

          sed "s|DOCKER_IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml \
            | sed "s|CONTAINER_PORT_PLACEHOLDER|$APP_PORT|g" \
            | sed "s|APP_ENV_PLACEHOLDER|$ENV_NAME|g" \
            > k8s/deployment-dev.yaml

          sed "s|TARGET_PORT_PLACEHOLDER|$APP_PORT|g" k8s/service.yaml \
            | sed "s|SERVICE_TYPE_PLACEHOLDER|$SERVICE_TYPE|g" \
            > k8s/service-dev.yaml
          
          echo "Generated deployment file:"
          cat k8s/deployment-dev.yaml

          echo "Generated service file:"
          cat k8s/service-dev.yaml

          kubectl apply -n "$ENV_NAME" -f k8s/deployment-dev.yaml
          kubectl apply -n "$ENV_NAME" -f k8s/service-dev.yaml

          kubectl rollout status deployment/devsecops-app -n "$ENV_NAME" --timeout=180s

          kubectl get pods -n "$ENV_NAME"
          kubectl get svc -n "$ENV_NAME"

      - name: Deploy to staging
        run: |
          echo "=================================================="
          echo "DEPLOYING TO STAGING"
          echo "=================================================="

          ENV_NAME="staging"
          SERVICE_TYPE="ClusterIP"

          echo "Image: $IMAGE"
          echo "Port : $APP_PORT"

          kubectl create namespace "$ENV_NAME" --dry-run=client -o yaml | kubectl apply -f -

          sed "s|DOCKER_IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml \
            | sed "s|CONTAINER_PORT_PLACEHOLDER|$APP_PORT|g" \
            | sed "s|APP_ENV_PLACEHOLDER|$ENV_NAME|g" \
            > k8s/deployment-staging.yaml

          sed "s|TARGET_PORT_PLACEHOLDER|$APP_PORT|g" k8s/service.yaml \
            | sed "s|SERVICE_TYPE_PLACEHOLDER|$SERVICE_TYPE|g" \
            > k8s/service-staging.yaml

          echo "Generated deployment file:"
          cat k8s/deployment-dev.yaml

          echo "Generated service file:"
          cat k8s/service-dev.yaml

          kubectl apply -n "$ENV_NAME" -f k8s/deployment-staging.yaml
          kubectl apply -n "$ENV_NAME" -f k8s/service-staging.yaml

          kubectl rollout status deployment/devsecops-app -n "$ENV_NAME" --timeout=180s

          kubectl get pods -n "$ENV_NAME"
          kubectl get svc -n "$ENV_NAME"

      - name: Deploy to production
        run: |
          echo "=================================================="
          echo "DEPLOYING TO PRODUCTION"
          echo "=================================================="

          ENV_NAME="production"
          SERVICE_TYPE="LoadBalancer"

          echo "Image: $IMAGE"
          echo "Port : $APP_PORT"

          kubectl create namespace "$ENV_NAME" --dry-run=client -o yaml | kubectl apply -f -

          sed "s|DOCKER_IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml \
            | sed "s|CONTAINER_PORT_PLACEHOLDER|$APP_PORT|g" \
            | sed "s|APP_ENV_PLACEHOLDER|$ENV_NAME|g" \
            > k8s/deployment-production.yaml

          sed "s|TARGET_PORT_PLACEHOLDER|$APP_PORT|g" k8s/service.yaml \
            | sed "s|SERVICE_TYPE_PLACEHOLDER|$SERVICE_TYPE|g" \
            > k8s/service-production.yaml

          echo "Generated deployment file:"
          cat k8s/deployment-dev.yaml

          echo "Generated service file:"
          cat k8s/service-dev.yaml

          kubectl apply -n "$ENV_NAME" -f k8s/deployment-production.yaml
          kubectl apply -n "$ENV_NAME" -f k8s/service-production.yaml

          kubectl rollout status deployment/devsecops-app -n "$ENV_NAME" --timeout=180s

          kubectl get pods -n "$ENV_NAME"
          kubectl get svc -n "$ENV_NAME"

      - name: Show production service URL
        run: |
          echo "=================================================="
          echo "PRODUCTION SERVICE URL"
          echo "=================================================="

          echo "Waiting for production LoadBalancer..."
          sleep 30

          kubectl get svc devsecops-service -n production

          echo ""
          echo "If EXTERNAL-IP is pending, wait 1-2 minutes and check again:"
          echo "kubectl get svc devsecops-service -n production"
